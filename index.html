<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ease:cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{--bg:#0b0b0f;--text:#eae6df;--text2:#8e8a82;--text3:#55524c;--glass:rgba(255,255,255,.045);--glass-b:rgba(255,255,255,.07);--glass-s:rgba(255,255,255,.1);--card:rgba(255,255,255,.03);--card-h:rgba(255,255,255,.055);--accent:#d4a54a;--accent-dim:rgba(212,165,74,.12);--divider:rgba(255,255,255,.05);--input:rgba(255,255,255,.04);--modal:rgba(14,14,18,.94);--shadow:0 8px 40px rgba(0,0,0,.4);--shadow-l:0 30px 80px rgba(0,0,0,.55);--veg:#4ade80;--veg-bg:rgba(74,222,128,.08);--nv:#f87171;--nv-bg:rgba(248,113,113,.08);--bar-t:rgba(255,255,255,.06)}
[data-theme="light"]{--bg:#f6f2eb;--text:#1a1714;--text2:#6b6560;--text3:#a39e97;--glass:rgba(255,255,255,.6);--glass-b:rgba(255,255,255,.8);--glass-s:rgba(255,255,255,.85);--card:rgba(255,255,255,.5);--card-h:rgba(255,255,255,.7);--accent:#b8860b;--accent-dim:rgba(184,134,11,.1);--divider:rgba(0,0,0,.06);--input:rgba(0,0,0,.03);--modal:rgba(246,242,235,.95);--shadow:0 8px 40px rgba(0,0,0,.06);--shadow-l:0 30px 80px rgba(0,0,0,.1);--veg:#16a34a;--veg-bg:rgba(22,163,74,.07);--nv:#dc2626;--nv-bg:rgba(220,38,38,.07);--bar-t:rgba(0,0,0,.06)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .5s,color .5s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}
.cg{display:grid;grid-template-columns:1fr;gap:14px;max-width:1440px;margin:0 auto;padding:0 16px 80px}
@media(min-width:540px){.cg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.cg{grid-template-columns:repeat(3,1fr);padding:0 32px 80px}}
@media(min-width:1280px){.cg{grid-template-columns:repeat(4,1fr)}}
.gc{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;overflow:hidden;transition:all .35s;cursor:pointer}
.gc:hover{transform:translateY(-5px);box-shadow:var(--shadow-l);background:var(--card-h)}
.fr{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fb{padding:7px 16px;border-radius:11px;border:1px solid var(--glass-b);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--text2);font-size:12px;cursor:pointer;transition:all .25s;font-weight:500;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px}
.fb:hover{color:var(--text);border-color:rgba(212,165,74,.2)}
.fb.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(212,165,74,.3);font-weight:600}
.fb.veg-on{background:var(--veg-bg)!important;color:var(--veg)!important;border-color:rgba(74,222,128,.2)!important}
.fb.nv-on{background:var(--nv-bg)!important;color:var(--nv)!important;border-color:rgba(248,113,113,.2)!important}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-right:4px}
.si{width:100%;padding:15px 20px 15px 50px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-b);border-radius:16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:all .35s;box-shadow:var(--shadow)}
.si:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim),var(--shadow)}
.si::placeholder{color:var(--text3)}
.tr{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 0;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.tr::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:9px 18px;border-radius:12px;border:1px solid var(--glass-b);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.tb:hover{border-color:rgba(212,165,74,.2);color:var(--text)}
.tb.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.ob{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.ob.open{display:flex}
.mb{background:var(--modal);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--glass-b);border-radius:28px;max-width:680px;width:100%;position:relative;overflow:hidden;animation:mI .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-l);margin:auto 0}

.slabel{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#888;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.slabel::after{content:'';flex:1;height:1px;background:rgba(128,128,128,.15)}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:6px}
.ig-item{display:flex;gap:8px;padding:8px 12px;background:var(--input);border-radius:10px;transition:background .2s}
.ig-item:hover{background:var(--glass-s)}
.ig-num{width:20px;height:20px;border-radius:6px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ig-text{font-size:13px;color:var(--text2);line-height:1.4}
.tl{padding-left:22px;position:relative}
.tl::before{content:'';position:absolute;left:7px;top:5px;bottom:5px;width:1px;background:var(--divider)}
.tl-s{position:relative;margin-bottom:12px}
.tl-d{position:absolute;left:-17px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:var(--bg)}
.tl-t{font-size:14px;color:var(--text2);line-height:1.6;font-weight:300}
.theme-btn{position:fixed;top:18px;right:18px;z-index:200;width:44px;height:44px;border-radius:14px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .3s;box-shadow:var(--shadow);color:var(--text)}
.theme-btn:hover{transform:scale(1.08);border-color:var(--accent)}
.serif{font-family:'Instrument Serif',serif}
.hl{font-style:italic;background:linear-gradient(135deg,var(--accent),#e06840);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hl2{font-style:italic;background:linear-gradient(135deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hl3{font-style:italic;background:linear-gradient(135deg,#10b981,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hl4{font-style:italic;background:linear-gradient(135deg,#f59e0b,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

</style>
</head>

function filVit(){var f=VITALS.slice();if(vitCat!=='All')f=f.filter(function(v){return v.cat===vitCat});if(search){var s=search.toLowerCase();f=f.filter(function(v){return(v.n+v.cat+v.why+v.rda+v.timing+v.best+v.veg.join(' ')+v.nv.join(' ')+v.herbal.join(' ')).toLowerCase().indexOf(s)>=0})}return f}

function makeFilterBtn(label,val,currentVal,setter){
  var isOn=val===currentVal;
  var cls='fb'+(isOn?' on':'');
  if(val==='Veg'&&isOn)cls='fb veg-on';
  if(val==='Non-Veg'&&isOn)cls='fb nv-on';
  var dot='';
  if(val==='Veg')dot='<span style="width:7px;height:7px;border-radius:50%;background:var(--veg)"></span>';
  if(val==='Non-Veg')dot='<span style="width:7px;height:7px;border-radius:50%;background:var(--nv)"></span>';
  var icon=(CE[val]||'')+(val!=='All'&&CE[val]?' ':'');
  var sIcon=(SE[val]||'')+(val!=='All'&&SE[val]?' ':'');
  var display=label==='season'?sIcon+val:label==='cat'?icon+val:dot+val;
  return '<button class="'+cls+'" onclick="'+setter+'">'+display+'</button>';
}
