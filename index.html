<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);--tt:.5s}
[data-theme="dark"]{
--bg:#0b0b0f;--bg2:#111116;--bg3:#18181e;
--glass:rgba(255,255,255,.045);--glass-h:rgba(255,255,255,.07);--glass-b:rgba(255,255,255,.07);--glass-s:rgba(255,255,255,.1);
--text:#eae6df;--text2:#8e8a82;--text3:#55524c;
--accent:#d4a54a;--accent-dim:rgba(212,165,74,.12);--accent2:#e06840;
--soya:#2dd4bf;--soya-dim:rgba(45,212,191,.1);--soya-b:rgba(45,212,191,.18);
--paneer:#f59e0b;--paneer-dim:rgba(245,158,11,.1);--paneer-b:rgba(245,158,11,.18);
--chicken:#ef4444;--chicken-dim:rgba(239,68,68,.1);--chicken-b:rgba(239,68,68,.18);
--egg:#a78bfa;--egg-dim:rgba(167,139,250,.1);--egg-b:rgba(167,139,250,.18);
--pizza:#3b82f6;--pizza-dim:rgba(59,130,246,.1);--pizza-b:rgba(59,130,246,.18);
--veg:#4ade80;--veg-bg:rgba(74,222,128,.08);--veg-b:rgba(74,222,128,.15);
--nv:#f87171;--nv-bg:rgba(248,113,113,.08);--nv-b:rgba(248,113,113,.15);
--card-bg:rgba(255,255,255,.03);--card-hover:rgba(255,255,255,.055);
--divider:rgba(255,255,255,.05);--shadow:0 8px 40px rgba(0,0,0,.4);--shadow-l:0 30px 80px rgba(0,0,0,.55);
--modal-bg:rgba(14,14,18,.94);--input-bg:rgba(255,255,255,.04);
--ing-bg:rgba(255,255,255,.025);--step-line:rgba(255,255,255,.06);--step-dot:var(--accent);
--nutri:#10b981;--nutri-dim:rgba(16,185,129,.1);--nutri-b:rgba(16,185,129,.18);
--pro-c:#f59e0b;--carb-c:#3b82f6;--fat-c:#ef4444;--fiber-c:#10b981;--vita-c:#a78bfa;--mineral-c:#2dd4bf;--water-c:#06b6d4;
--bar-track:rgba(255,255,255,.06);
}
[data-theme="light"]{
--bg:#f6f2eb;--bg2:#ede8df;--bg3:#e4dfd6;
--glass:rgba(255,255,255,.6);--glass-h:rgba(255,255,255,.75);--glass-b:rgba(255,255,255,.8);--glass-s:rgba(255,255,255,.85);
--text:#1a1714;--text2:#6b6560;--text3:#a39e97;
--accent:#b8860b;--accent-dim:rgba(184,134,11,.1);--accent2:#c44a20;
--soya:#0d9488;--soya-dim:rgba(13,148,136,.08);--soya-b:rgba(13,148,136,.15);
--paneer:#b45309;--paneer-dim:rgba(180,83,9,.08);--paneer-b:rgba(180,83,9,.15);
--chicken:#dc2626;--chicken-dim:rgba(220,38,38,.08);--chicken-b:rgba(220,38,38,.15);
--egg:#7c3aed;--egg-dim:rgba(124,58,237,.08);--egg-b:rgba(124,58,237,.15);
--pizza:#2563eb;--pizza-dim:rgba(37,99,235,.08);--pizza-b:rgba(37,99,235,.15);
--veg:#16a34a;--veg-bg:rgba(22,163,74,.07);--veg-b:rgba(22,163,74,.12);
--nv:#dc2626;--nv-bg:rgba(220,38,38,.07);--nv-b:rgba(220,38,38,.12);
--card-bg:rgba(255,255,255,.5);--card-hover:rgba(255,255,255,.7);
--divider:rgba(0,0,0,.06);--shadow:0 8px 40px rgba(0,0,0,.06);--shadow-l:0 30px 80px rgba(0,0,0,.1);
--modal-bg:rgba(246,242,235,.95);--input-bg:rgba(0,0,0,.03);
--ing-bg:rgba(0,0,0,.02);--step-line:rgba(0,0,0,.06);--step-dot:var(--accent);
--nutri:#059669;--nutri-dim:rgba(5,150,105,.08);--nutri-b:rgba(5,150,105,.15);
--pro-c:#b45309;--carb-c:#2563eb;--fat-c:#dc2626;--fiber-c:#059669;--vita-c:#7c3aed;--mineral-c:#0d9488;--water-c:#0891b2;
--bar-track:rgba(0,0,0,.06);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--tt) var(--ease),color var(--tt) var(--ease)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
.ambient .o1{width:500px;height:500px;top:-10%;left:-5%;background:radial-gradient(circle,rgba(212,165,74,.08),transparent 70%)}
.ambient .o2{width:600px;height:600px;bottom:-15%;right:-10%;background:radial-gradient(circle,rgba(224,104,64,.05),transparent 70%)}
.ambient .o3{width:400px;height:400px;top:40%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(45,212,191,.04),transparent 70%)}
.theme-btn{position:fixed;top:18px;right:18px;z-index:200;width:44px;height:44px;border-radius:14px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .3s;box-shadow:var(--shadow)}
.theme-btn:hover{transform:scale(1.08);border-color:var(--accent);box-shadow:0 0 24px var(--accent-dim)}

/* ─── NAV TABS (top-level: Recipes / Nutrition) ─── */
.nav{display:flex;justify-content:center;gap:8px;padding:20px 16px 0;position:relative;z-index:2}
.nav-btn{padding:10px 28px;border-radius:14px;border:1px solid var(--glass-b);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}
.nav-btn:hover{border-color:var(--accent);color:var(--text);transform:translateY(-1px)}
.nav-btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent);box-shadow:0 4px 20px var(--accent-dim)}
.nav-btn .nav-icon{font-size:16px}

/* ─── HERO ─── */
.hero{position:relative;z-index:1;padding:24px 20px 28px;text-align:center}
@media(min-width:768px){.hero{padding:32px 40px 36px}}
.hero h1{font-family:'Instrument Serif',serif;font-size:clamp(2.6rem,8vw,5.5rem);font-weight:400;letter-spacing:-.03em;line-height:.92}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .tagline{margin-top:10px;font-size:clamp(12px,1.8vw,15px);color:var(--text3);letter-spacing:.2em;text-transform:uppercase;font-weight:400}
.stats{display:flex;justify-content:center;gap:10px;margin-top:28px;flex-wrap:wrap}
.stat{padding:12px 22px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:16px;display:flex;align-items:center;gap:10px;transition:all .35s}
.stat:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 32px var(--accent-dim)}
.stat b{font-family:'Instrument Serif',serif;font-size:1.5rem;color:var(--accent)}
.stat span{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;font-weight:500}

/* ─── CONTROLS ─── */
.controls{max-width:1440px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
@media(min-width:768px){.controls{padding:0 32px}}
.search{position:relative;margin-bottom:20px}
.search input{width:100%;padding:15px 20px 15px 50px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-b);border-radius:16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:all .35s;box-shadow:var(--shadow)}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim),var(--shadow)}
.search input::placeholder{color:var(--text3)}
.search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--text3);transition:color .3s}
.search input:focus~svg{color:var(--accent)}
.search .badge{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3);background:var(--input-bg);padding:4px 12px;border-radius:10px;font-weight:500}
.tab-scroll{overflow-x:auto;scrollbar-width:none;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.tab-scroll::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:7px;width:max-content;min-width:100%}
.tab{flex-shrink:0;padding:9px 20px;border-radius:12px;border:1px solid var(--glass-b);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;white-space:nowrap;position:relative;overflow:hidden}
.tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
.tab:hover{border-color:rgba(212,165,74,.2);color:var(--text);transform:translateY(-1px)}
.tab.on{border-color:var(--accent);color:var(--bg);font-weight:600}
.tab.on::before{opacity:1}
.tab i{position:relative;z-index:1;font-style:normal}
.tab .n{margin-left:5px;opacity:.55;font-size:11px}
.type-filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.type-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-right:4px}
.tf{padding:7px 18px;border-radius:11px;border:1px solid var(--glass-b);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--text2);font-size:12px;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.tf:hover{border-color:rgba(255,255,255,.12);color:var(--text);transform:translateY(-1px)}
.tf .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tf.all-type.on{background:var(--glass-s);color:var(--text);border-color:var(--accent);font-weight:600}
.tf.veg-type .dot{background:var(--veg)}.tf.veg-type.on{background:var(--veg-bg);color:var(--veg);border-color:var(--veg-b);font-weight:600}
.tf.nv-type .dot{background:var(--nv)}.tf.nv-type.on{background:var(--nv-bg);color:var(--nv);border-color:var(--nv-b);font-weight:600}
.subs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.sub{padding:6px 15px;border-radius:10px;border:1px solid transparent;background:var(--input-bg);color:var(--text3);font-size:12px;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;font-weight:500}
.sub:hover{color:var(--text2);background:var(--glass-h)}
.sub.on{background:var(--glass-s);color:var(--text);border-color:var(--glass-b);backdrop-filter:blur(12px)}

/* ─── GRID ─── */
.grid{display:grid;grid-template-columns:1fr;gap:14px;padding:0 16px 80px;max-width:1440px;margin:0 auto;position:relative;z-index:1}
@media(min-width:540px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr);gap:16px;padding:0 32px 80px}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(4,1fr)}}

/* ─── CARD ─── */
.card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:0;cursor:pointer;transition:all .4s var(--ease);position:relative;overflow:hidden;display:flex;flex-direction:column}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .3s}
.card:hover{transform:translateY(-5px);border-color:rgba(212,165,74,.12);box-shadow:var(--shadow-l);background:var(--card-hover)}
.card:hover::before{opacity:1}
.card[data-c="soya"]::before{background:var(--soya)}.card[data-c="soya"] .card-cat{color:var(--soya);background:var(--soya-dim);border-color:var(--soya-b)}
.card[data-c="paneer"]::before{background:var(--paneer)}.card[data-c="paneer"] .card-cat{color:var(--paneer);background:var(--paneer-dim);border-color:var(--paneer-b)}
.card[data-c="chicken"]::before{background:var(--chicken)}.card[data-c="chicken"] .card-cat{color:var(--chicken);background:var(--chicken-dim);border-color:var(--chicken-b)}
.card[data-c="egg"]::before{background:var(--egg)}.card[data-c="egg"] .card-cat{color:var(--egg);background:var(--egg-dim);border-color:var(--egg-b)}
.card[data-c="pizza"]::before{background:var(--pizza)}.card[data-c="pizza"] .card-cat{color:var(--pizza);background:var(--pizza-dim);border-color:var(--pizza-b)}
.card-body{padding:20px 20px 0;flex:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card-name{font-family:'Instrument Serif',serif;font-size:1.15rem;line-height:1.25;flex:1}
.card-type{flex-shrink:0;font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:100px}
.card-type.v{color:var(--veg);background:var(--veg-bg);border:1px solid var(--veg-b)}
.card-type.nv{color:var(--nv);background:var(--nv-bg);border:1px solid var(--nv-b)}
.card-tags{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.card-cat{font-size:10px;font-weight:600;padding:3px 10px;border-radius:8px;border:1px solid transparent;letter-spacing:.03em}
.card-sub{font-size:10px;color:var(--text3);padding:3px 9px;background:var(--input-bg);border-radius:8px}
.card-ing{padding:12px 0 0;border-top:1px solid var(--divider)}
.card-ing-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:600;margin-bottom:6px}
.card-ing-list{display:flex;flex-wrap:wrap;gap:4px}
.card-pill{font-size:11px;color:var(--text2);padding:3px 8px;background:var(--ing-bg);border-radius:6px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-foot{padding:10px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.card-cook{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.card-cook svg{width:12px;height:12px;opacity:.5}
.card-arrow{font-size:11px;color:var(--text3);opacity:0;transition:opacity .25s;display:flex;align-items:center;gap:3px}
.card:hover .card-arrow{opacity:1}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--modal-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--glass-b);border-radius:28px;max-width:680px;width:100%;padding:0;position:relative;animation:mIn .45s var(--bounce);box-shadow:var(--shadow-l);margin:auto 0;overflow:hidden}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(20px)}to{opacity:1;transform:none}}
.m-close{position:absolute;top:16px;right:16px;z-index:10;width:38px;height:38px;border-radius:12px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-b);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .25s}
.m-close:hover{background:var(--glass-s);color:var(--text);transform:rotate(90deg)}
.m-header{padding:32px 32px 0;position:relative}
.m-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.m-header[data-c="soya"]::before{background:var(--soya)}.m-header[data-c="paneer"]::before{background:var(--paneer)}.m-header[data-c="chicken"]::before{background:var(--chicken)}.m-header[data-c="egg"]::before{background:var(--egg)}.m-header[data-c="pizza"]::before{background:var(--pizza)}.m-header[data-c="nutri"]::before{background:var(--nutri)}
.m-title{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.15;padding-right:48px;margin-bottom:10px}
.m-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.m-tag{font-size:11px;padding:5px 14px;border-radius:100px;font-weight:500}
.m-section{padding:0 32px}.m-section+.m-section{margin-top:20px}
.m-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.m-label::after{content:'';flex:1;height:1px;background:var(--divider)}
.ing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.ing-item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:var(--ing-bg);border-radius:10px;transition:background .2s}
.ing-item:hover{background:var(--glass-h)}
.ing-num{width:20px;height:20px;border-radius:6px;background:var(--accent-dim);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ing-text{font-size:13px;color:var(--text2);line-height:1.4}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:1px;background:var(--step-line)}
.tl-step{position:relative;margin-bottom:14px;animation:sIn .35s var(--ease) both}
.tl-step:nth-child(1){animation-delay:.05s}.tl-step:nth-child(2){animation-delay:.1s}.tl-step:nth-child(3){animation-delay:.15s}.tl-step:nth-child(4){animation-delay:.2s}
@keyframes sIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.tl-dot{position:absolute;left:-23px;top:5px;width:11px;height:11px;border-radius:50%;border:2px solid var(--step-dot);background:var(--bg)}
.tl-text{font-size:14px;color:var(--text2);line-height:1.65;font-weight:300}
.cook-info{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.cook-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent-dim);border:1px solid rgba(212,165,74,.15);border-radius:12px;font-size:12px;color:var(--accent);font-weight:500}
.cook-pill svg{width:14px;height:14px}
.m-footer{padding:20px 32px 28px}

/* ─── NUTRITION CARDS ─── */
.nutri-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;overflow:hidden;transition:all .4s var(--ease)}
.nutri-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-l);border-color:rgba(16,185,129,.15)}
.nutri-head{padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.nutri-name{font-family:'Instrument Serif',serif;font-size:1.15rem;line-height:1.25;flex:1}
.nutri-badge{font-size:10px;font-weight:600;padding:4px 12px;border-radius:100px;white-space:nowrap}
.nutri-meta{padding:0 20px;display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.nutri-pill{font-size:10px;padding:3px 10px;border-radius:8px;font-weight:500}
.nutri-bar-wrap{padding:0 20px 4px}
.nutri-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500}
.nutri-bar{height:6px;border-radius:3px;background:var(--bar-track);overflow:hidden;margin-bottom:10px}
.nutri-bar-fill{height:100%;border-radius:3px;transition:width .8s var(--ease)}
.nutri-sources{padding:12px 20px 16px;border-top:1px solid var(--divider)}
.nutri-sources-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:600;margin-bottom:8px}
.nutri-src-list{display:flex;flex-wrap:wrap;gap:4px}
.nutri-src{font-size:11px;padding:4px 10px;border-radius:8px;background:var(--ing-bg);color:var(--text2);transition:background .2s}
.nutri-src:hover{background:var(--glass-h)}

/* ─── EMPTY ─── */
.empty{grid-column:1/-1;text-align:center;padding:80px 24px}
.empty-box{width:72px;height:72px;margin:0 auto 20px;border-radius:20px;background:var(--glass);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;font-size:28px}

// ═══ RECIPE ENGINE ═══
function parse(inst){const steps=inst.split(/\s*=>\s*/),ings=[],methods=[],cooks=[],seen=new Set();const aw=['cook','fry','boil','mix','blend','grind','marinate','airfry','wrap','spread','make','coat','shred','freeze','shape','add','transfer','saute','sauté','rest','serve','create','brown'];steps.forEach(s=>{s.split(/\s*\+\s*/).forEach(p=>{p=p.trim();if(!p)return;if(/\d+\s*°?C|\d+\s*deg|\d+[\s-]*min\b/i.test(p))cooks.push(p);const isA=aw.some(w=>p.toLowerCase().includes(w))&&!/^\d/.test(p);if(isA&&p.length>3)methods.push(p);else{const k=p.toLowerCase();if(!seen.has(k)&&k.length>1){seen.add(k);ings.push(p)}}})});if(!methods.length)methods.push(...steps.filter(s=>s.trim()));return{ings,methods,cooks:[...new Set(cooks)]}}

const all=[];Object.entries(D).forEach(([cat,d])=>d.recipes.forEach(r=>{all.push({...r,cat,key:d.k,parsed:parse(r.i)})}));

let aT='All',aS='All',aF='All',q='';
document.getElementById('s1').textContent=all.length;
document.getElementById('s2').textContent=all.filter(r=>r.t==='Veg').length;
document.getElementById('s3').textContent=all.filter(r=>r.t!=='Veg').length;

function fil(){let f=all;if(aT!=='All')f=f.filter(r=>r.cat===aT);if(aF!=='All')f=f.filter(r=>r.t===aF);if(aS!=='All')f=f.filter(r=>r.c===aS);if(q){const s=q.toLowerCase();f=f.filter(r=>(r.n+' '+r.i+' '+r.c+' '+r.t+' '+r.cat).toLowerCase().includes(s))}return f}
function rT(){document.getElementById('tabs').innerHTML=['All',...Object.keys(D)].map(c=>{const n=c==='All'?all.length:D[c].recipes.length;return`<button class="tab${aT===c?' on':''}" onclick="sT('${c}')"><i>${c==='All'?'All Recipes':c}<span class="n">${n}</span></i></button>`}).join('')}
function rTF(){document.querySelectorAll('#typeFilters .tf').forEach(b=>b.classList.remove('on'));document.querySelector(aF==='All'?'.tf.all-type':aF==='Veg'?'.tf.veg-type':'.tf.nv-type').classList.add('on')}
function rS(){const e=document.getElementById('subs'),f=aT==='All'?all:all.filter(r=>r.cat===aT),ff=aF==='All'?f:f.filter(r=>r.t===aF),cs=[...new Set(ff.map(r=>r.c))].sort();if(cs.length<=1){e.innerHTML='';return}e.innerHTML=['All',...cs].map(c=>`<button class="sub${aS===c?' on':''}" onclick="sS('${c}')">${c}</button>`).join('')}
function rG(){const g=document.getElementById('grid'),f=fil();document.getElementById('cnt').textContent=q?f.length+' found':f.length+' recipes';
if(!f.length){g.innerHTML='<div class="empty"><div class="empty-box">🍽️</div><h3>No recipes found</h3><p>Try adjusting your search or filters</p></div>';return}
g.innerHTML=f.map((r,i)=>{const pills=r.parsed.ings.slice(0,6),ck=r.parsed.cooks.length?r.parsed.cooks[0].replace(/.*?(\d+\s*°?C.*)/i,'$1').substring(0,30):'';return`<div class="card fade" data-c="${r.key}" style="animation-delay:${Math.min(i*.03,.55)}s" onclick='oM(${i})'><div class="card-body"><div class="card-top"><div class="card-name">${r.n}</div><span class="card-type ${r.t==='Veg'?'v':'nv'}">${r.t==='Veg'?'● Veg':'● Non-Veg'}</span></div><div class="card-tags"><span class="card-cat">${r.cat}</span><span class="card-sub">${r.c}</span></div><div class="card-ing"><div class="card-ing-title">Ingredients (${r.parsed.ings.length})</div><div class="card-ing-list">${pills.map(p=>`<span class="card-pill">${p}</span>`).join('')}${r.parsed.ings.length>6?`<span class="card-pill">+${r.parsed.ings.length-6} more</span>`:''}</div></div></div><div class="card-foot"><div class="card-cook">${ck?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${ck}`:''}</div><div class="card-arrow">View recipe →</div></div></div>`}).join('')}
function sT(t){aT=t;aS='All';aF='All';rT();rTF();rS();rG()}
function sTF(v){aF=v;aS='All';rTF();rS();rG()}
function sS(s){aS=s;rS();rG()}
document.getElementById('q').addEventListener('input',e=>{q=e.target.value;rG()});

let curFil=[];
function oM(idx){curFil=fil();const r=curFil[idx];if(!r)return;const o=document.getElementById('ov');document.getElementById('mH').setAttribute('data-c',r.key);document.getElementById('mT').textContent=r.n;const v=r.t==='Veg';document.getElementById('mG').innerHTML=`<span class="m-tag" style="background:var(--${r.key}-dim);color:var(--${r.key});border:1px solid var(--${r.key}-b)">${r.cat}</span><span class="m-tag" style="background:var(--input-bg);color:var(--text2)">${r.c}</span><span class="m-tag" style="background:${v?'var(--veg-bg)':'var(--nv-bg)'};color:${v?'var(--veg)':'var(--nv)'};border:1px solid ${v?'var(--veg-b)':'var(--nv-b)'}">${v?'● Vegetarian':'● Non-Veg'}</span>`;

document.getElementById('mSections').innerHTML=h;o.classList.add('open');document.body.style.overflow='hidden'}
